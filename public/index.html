<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNA+ — Assistente Virtual da UNASLAF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens UNA+ ─────────────────────────────────────────────────────── */
    :root {
      --blue:        #003087;
      --blue-mid:    #0047B3;
      --blue-light:  #E8F0FA;
      --blue-glow:   rgba(0,48,135,.15);
      --green:       #00A651;
      --green-light: #00C462;
      --green-pale:  #E6F7EE;
      --dark:        #001F5B;
      --mid:         #002470;
      --text:        #0D1B3E;
      --muted:       #6B7FA8;
      --border:      #D0DCF0;
      --bg:          #F4F7FC;
      --white:       #FFFFFF;
      --danger:      #D32F2F;
      --warn-bg:     #FFF9E6;
      --warn-border: #FFD54F;
      --radius:      16px;
      --shadow:      0 8px 32px rgba(0,48,135,0.08);
      --shadow-lg:   0 16px 48px rgba(0,48,135,0.12);
    }

    /* ── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    button { font-family: inherit; cursor: pointer; border: none; outline: none; }
    input, textarea, select { font-family: inherit; outline: none; }
    a { color: var(--blue); text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }

    /* ── Scrollbar ──────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #app { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── TELA DE LOGIN ──────────────────────────────────────────────────── */
    #screen-login {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 70% 30%, #0047B3 0%, #001F5B 100%);
      padding: 24px; position: relative;
    }
    .login-card {
      background: var(--white);
      border-radius: 24px;
      padding: 40px;
      width: 100%; max-width: 440px;
      box-shadow: var(--shadow-lg);
      position: relative; z-index: 1;
    }

    /* ESTILO DA IMAGEM IMPLEMENTADO */
    .img-login-header {
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin-bottom: 24px;
      display: block;
    }

    .login-logo {
      display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
    }
    .login-logo-mark {
      font-weight: 800; font-size: 28px; color: var(--blue); letter-spacing: -1.5px;
    }
    .login-logo-mark span { color: var(--green); }
    
    .login-title { font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
    .login-subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; line-height: 1.5; }

    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input {
      width: 100%; padding: 14px 18px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: 16px; color: var(--text); transition: all .2s;
    }
    .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-glow); }

    .btn-primary {
      width: 100%; padding: 16px;
      background: var(--blue); color: white;
      font-size: 16px; font-weight: 600; border-radius: var(--radius);
      transition: all .2s; margin-top: 8px;
    }
    .btn-primary:hover { background: var(--blue-mid); transform: translateY(-1px); }
    .btn-primary:active { transform: scale(.98); }

    .login-security {
      text-align: center; font-size: 12px; color: var(--muted); margin-top: 24px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    /* ── APP SHELL (Pós-login) ─────────────────────────────────────────── */
    #screen-app { display: none; flex-direction: column; min-height: 100vh; }
    #screen-app.show { display: flex; }

    .topbar {
      background: var(--dark); color: white;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 64px; position: sticky; top: 0; z-index: 100;
    }
    .topbar-brand { font-weight: 800; font-size: 20px; letter-spacing: -1px; }
    .topbar-brand span { color: var(--green); }
    
    .navbar {
      background: var(--white); border-bottom: 1px solid var(--border);
      display: flex; padding: 0 16px; gap: 8px;
    }
    .nav-btn {
      padding: 12px 20px; font-size: 14px; font-weight: 600; color: var(--muted);
      background: none; border-bottom: 3px solid transparent; transition: all .2s;
    }
    .nav-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

    .content { flex: 1; padding: 24px; max-width: 1000px; margin: 0 auto; width: 100%; }

    /* ── CHAT ───────────────────────────────────────────────────────────── */
    .chat-wrapper {
      background: var(--white); border-radius: 24px;
      height: calc(100vh - 200px); min-height: 500px;
      display: flex; flex-direction: column; box-shadow: var(--shadow); overflow: hidden;
    }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    
    .msg-bubble { 
      padding: 14px 18px; border-radius: 18px; font-size: 15px; line-height: 1.6; max-width: 85%;
    }
    .msg.user { align-self: flex-end; }
    .msg.user .msg-bubble { background: var(--blue); color: white; border-bottom-right-radius: 4px; }
    
    .msg.ai { align-self: flex-start; }
    .msg.ai .msg-bubble { background: var(--bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    .chat-input-bar { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
    .chat-input { flex: 1; padding: 14px 20px; border-radius: 30px; border: 1.5px solid var(--border); font-size: 15px; }

    /* Responsividade Mobile */
    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
      .login-title { font-size: 18px; }
      .content { padding: 16px; }
    }

    .step { display: none; }
    .step.active { display: block; }
    .panel { display: none; }
    .panel.active { display: block; }
    .loader { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="app">
  <div id="screen-login">
    <div class="login-card">
      <div id="step-cpf" class="step active">
        <img src="ic_unamais.png" class="img-login-header" alt="UNA+">
                 <div class="login-title">Acesso do Associado</div>
        <div class="login-subtitle">Informe seu CPF para acessar o assistente inteligente da UNASLAF.</div>
        
        <div id="login-error" style="color:var(--danger); font-size:13px; margin-bottom:15px; display:none;"></div>
        
        <div class="field">
          <label>CPF</label>
          <input id="input-cpf" type="text" placeholder="000.000.000-00" maxlength="14" />
        </div>
        
        <button id="btn-cpf" class="btn-primary">Entrar no App</button>
        
        <div class="login-security">🔒 Conexão segura e criptografada</div>
      </div>
    </div>
  </div>

  <div id="screen-app">
    <div class="topbar">
      <div class="topbar-brand">una<span>+</span></div>
      <div id="user-badge" style="font-size:13px; opacity:0.8;"></div>
      <button onclick="logout()" style="background:none; color:white; font-size:13px; font-weight:600;">Sair</button>
    </div>

    <nav class="navbar">
      <button class="nav-btn active" onclick="showPanel('chat')">Atendimento</button>
      <button class="nav-btn" onclick="showPanel('cadastro')">Meu Cadastro</button>
    </nav>

    <div class="content">
      <div id="panel-chat" class="panel active">
        <div class="chat-wrapper">
          <div style="background:var(--warn-bg); padding:12px 20px; font-size:12px; color:#856404; border-bottom:1px solid var(--warn-border);">
            ⚠️ As respostas da IA têm caráter orientativo e não substituem canais oficiais ou assessoria jurídica.
          </div>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input-bar">
            <input class="chat-input" id="chat-input" placeholder="Escreva sua dúvida aqui..." />
            <button id="btn-send" class="btn-primary" style="width:auto; margin:0; padding:0 20px; border-radius:30px;">Enviar</button>
          </div>
        </div>
      </div>

      <div id="panel-cadastro" class="panel">
        <div class="login-card" style="max-width:100%; box-shadow:var(--shadow);">
          <div class="login-title">Seus Dados</div>
          <p style="font-size:14px; color:var(--muted);">Dados sincronizados com a base da UNASLAF.</p>
          <div id="cadastro-info" style="margin-top:20px; line-height:2;">
            </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const state = { token: null, user: null };
  const $ = id => document.getElementById(id);

  // Formatação de CPF
  $('input-cpf').addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g, '');
    v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
    e.target.value = v;
  });

  // Simulação de Login
  $('btn-cpf').addEventListener('click', async () => {
    const cpf = $('input-cpf').value;
    if(cpf.length < 14) return alert('CPF incompleto');
    
    $('btn-cpf').innerHTML = '<span class="loader"></span>';
    
    // Simulando chamada de API
    setTimeout(() => {
      state.user = { nome: "Associado UNASLAF", cpf: cpf };
      $('screen-login').style.display = 'none';
      $('screen-app').classList.add('show');
      $('user-badge').textContent = state.user.nome;
      appendMsg('ai', 'Olá! Sou o assistente **una+**. Como posso ajudar você hoje?');
    }, 1000);
  });

  function showPanel(p) {
    document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    $('panel-' + p).classList.add('active');
    event.target.classList.add('active');
  }

  function appendMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `<div class="msg-bubble">${text}</div>`;
    $('chat-messages').appendChild(div);
    $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
  }

  $('btn-send').addEventListener('click', () => {
    const txt = $('chat-input').value;
    if(!txt) return;
    appendMsg('user', txt);
    $('chat-input').value = '';
    // Lógica de resposta da API entraria aqui
  });

  function logout() { location.reload(); }
</script>

</body>
</html>
